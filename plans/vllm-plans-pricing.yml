description: >-
  vLLM is free open-source software (Apache 2.0). The project does not sell hosting. Cost is incurred
  entirely on your own GPU infrastructure (cloud or on-prem). Several third parties (RunPod, Modal,
  Anyscale, Baseten, etc.) offer managed vLLM hosting, billed by them — not by the vLLM project.
notes: Apache 2.0 OSS; cost is your GPU infrastructure or third-party managed hosting.
sources:
- https://github.com/vllm-project/vllm
- https://docs.vllm.ai/
plans:
- id: vllm-self-host
  name: Self-Hosted (Apache 2.0)
  type: free
  description: Run vLLM on your own GPU infrastructure under Apache 2.0.
