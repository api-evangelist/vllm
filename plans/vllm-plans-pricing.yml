  - label: Self-Host
    name: self_host
    type: flat
    metric: deployment
    limit: -1
    timeFrame: lifetime
    geo: global
    unit: 1
    price: 0
    userMultiplied: false
  elements:
  - name: pip install vllm
  - name: vllm serve
  - name: Bring your own GPU
